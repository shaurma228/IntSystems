dataset:
  url: "https://raw.githubusercontent.com/plotly/datasets/master/diabetes.csv"
  local_cache: "data/diabetes.csv"
  test_size: 0.2
  random_state: 42
  zero_columns: [ "Glucose", "BloodPressure", "SkinThickness", "Insulin", "BMI" ]
  required_columns: [ "Pregnancies", "Glucose", "BloodPressure", "SkinThickness", "Insulin", "BMI", "DiabetesPedigreeFunction", "Age", "Outcome" ]

model:
  path: "models/model.pkl"
  error_analysis_path: "models/error_analysis.csv"
  cv: 5
  scoring: "f1"
  random_state: 42
  max_iter: 1000

hyperparameters:
  logistic_regression:
    model__C: [ 0.1, 1, 10 ]
    model__class_weight: [ "balanced" ]
  random_forest:
    model__n_estimators: [ 100, 200 ]
    model__max_depth: [ null, 5, 10 ]
    model__class_weight: [ "balanced" ]
  gradient_boosting:
    model__n_estimators: [ 100, 200 ]
    model__learning_rate: [ 0.01, 0.1 ]
    model__max_depth: [ 3, 5 ]
